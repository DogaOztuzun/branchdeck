services:
  branchdeck:
    build: .
    ports:
      - "13371:13371"
    volumes:
      - ./repos:/repos
      - ./config:/root/.config/branchdeck
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BRANCHDECK_PORT=13371
      - BRANCHDECK_WORKSPACE=/repos
    restart: unless-stopped
