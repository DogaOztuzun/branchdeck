name: Claude Code Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

jobs:
  claude-review:
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            PR TITLE: ${{ github.event.pull_request.title }}

            You are reviewing a PR in Branchdeck — a Tauri v2 desktop app (Rust backend + SolidJS frontend).
            Read CLAUDE.md first for project conventions, then review.

            Review focus:
            - Bugs, race conditions, edge cases
            - Security (no unsafe, no unwrap, no SQL/command injection)
            - Rust: clippy pedantic compliance, thiserror usage, no business logic in commands/
            - TypeScript: strict mode, no `any`, named exports, IPC wrapped in lib/commands/
            - Logging: every service function must follow the structured logging convention
            - Performance: no hot-path debug! logging, no unnecessary clones

            Process:
            1. Read the full diff: `gh pr diff ${{ github.event.pull_request.number }}`
            2. Read ALL existing review comments: `gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments` — do NOT re-report anything already raised or acknowledged by the author
            3. Read the changed files fully (not just the diff) to understand context
            4. Review EVERY changed file systematically — do not stop after finding a few issues
            5. Post inline comments with `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`)
            6. Post a single summary via `gh pr comment ${{ github.event.pull_request.number }}`

            Severity levels — only report:
            - Critical: bugs, crashes, data loss, security vulnerabilities
            - Important: race conditions, resource leaks, incorrect logic
            Do NOT report: style preferences, minor naming, logging level opinions, theoretical edge cases that require unlikely conditions

            Rules:
            - Be exhaustive — review ALL changed files in ONE pass, do not phase or stage findings across rounds
            - NEVER re-report an issue that already has an inline comment from a previous review
            - If the author replied to a finding explaining it's intentional, respect that and skip it
            - If no new issues found, post a short summary confirming the changes look good
            - Be concise — skip praise, focus on actionable findings
            - This is a review-only workflow — do NOT suggest fixes that would require code changes, just identify the issue

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*),Read,Glob,Grep"
