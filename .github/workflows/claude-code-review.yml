name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            PR TITLE: ${{ github.event.pull_request.title }}

            You are reviewing a PR in Branchdeck — a Tauri v2 desktop app (Rust backend + SolidJS frontend).
            Read CLAUDE.md first for project conventions, then review.

            Review focus:
            - Bugs, race conditions, edge cases
            - Security (no unsafe, no unwrap, no SQL/command injection)
            - Rust: clippy pedantic compliance, thiserror usage, no business logic in commands/
            - TypeScript: strict mode, no `any`, named exports, IPC wrapped in lib/commands/
            - Logging: every service function must follow the structured logging convention
            - Performance: no hot-path debug! logging, no unnecessary clones

            Instructions:
            - Use `gh pr diff ${{ github.event.pull_request.number }}` to read the full diff
            - Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) for specific code issues
            - Post a single summary via `gh pr comment ${{ github.event.pull_request.number }}` at the end
            - If no issues found, still post a short summary confirming the PR looks good
            - Be concise — skip praise, focus on actionable findings

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob,Grep" --max-turns 15
