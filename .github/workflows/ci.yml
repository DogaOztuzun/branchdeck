name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  pull_request_review:
    types: [submitted]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      rust: ${{ steps.filter.outputs.rust }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'package.json'
              - 'bun.lock'
              - 'biome.json'
              - 'tsconfig.json'
              - 'vite.config.*'
            rust:
              - 'src-tauri/**'
              - 'crates/**'
            docker:
              - 'Dockerfile'
              - 'docker-compose.yml'
              - '.dockerignore'

  check-frontend:
    name: Frontend (Biome + build)
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run test
      - run: bun run build

  check-rust-fast:
    name: Rust (fmt + clippy + test)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --check
      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests
        working-directory: src-tauri
        run: cargo test

  check-cargo-deny:
    name: Rust (cargo-deny)
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories
          manifest-path: src-tauri/Cargo.toml

  docker-smoke:
    name: Docker (build + health check)
    needs: [changes, check-rust-fast, check-frontend]
    if: >-
      always() &&
      needs.check-rust-fast.result != 'failure' &&
      needs.check-frontend.result != 'failure' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && (
          needs.changes.outputs.frontend == 'true' ||
          needs.changes.outputs.rust == 'true' ||
          needs.changes.outputs.docker == 'true'
        ))
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t branchdeck-test .
      - name: Run container and health check
        run: |
          TOKEN=$(openssl rand -hex 32)
          CONTAINER_ID=$(docker run --rm -d -p 13371:13371 \
            -e BRANCHDECK_BIND=0.0.0.0 \
            -v "$(pwd)/ci-config:/home/branchdeck/.config/branchdeck" \
            branchdeck-test \
            sh -c "mkdir -p /home/branchdeck/.config/branchdeck && echo '$TOKEN' > /home/branchdeck/.config/branchdeck/auth.token && exec branchdeck-daemon serve")
          for i in $(seq 1 15); do
            curl -sf http://localhost:13371/api/health && break || sleep 2
          done
          curl -f http://localhost:13371/api/health
          docker stop "$CONTAINER_ID"

  check-rust-full:
    name: Rust (test + build)
    needs: [check-frontend, check-rust-fast]
    if: >-
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request_review' && github.event.review.state == 'approved')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-
      - run: bun install --frozen-lockfile
      - name: Tests
        working-directory: src-tauri
        run: cargo test
      - name: Build Tauri app
        run: bunx tauri build 2>&1 | tail -20
