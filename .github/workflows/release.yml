name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: 'Dry run (skip push and release)'
        required: false
        default: false
        type: boolean

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify on main branch
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [ "$BRANCH" != "main" ]; then
            echo "::error::Release must be run from main branch (current: $BRANCH)"
            exit 1
          fi
      - name: Verify clean working tree
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Working tree is dirty"
            exit 1
          fi
      - name: Verify updater signing key is configured
        run: |
          if grep -q "REPLACE_BEFORE_RELEASE" src-tauri/tauri.conf.json; then
            echo "::error::Updater public key is still a placeholder — generate a signing keypair and set the real pubkey in src-tauri/tauri.conf.json before releasing"
            exit 1
          fi

  version:
    name: Bump version
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version
        id: current
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: bump
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.current.outputs.version }}"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          VERSION="${major}.${minor}.${patch}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "## Version bump: ${{ steps.current.outputs.version }} → ${VERSION}" >> "$GITHUB_STEP_SUMMARY"

      - name: Check tag does not exist
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi

      - uses: oven-sh/setup-bun@v2

      - name: Update version in all files
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          jq ".version = \"${VERSION}\"" package.json > tmp.json && mv tmp.json package.json
          jq ".version = \"${VERSION}\"" src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          sed -i "0,/^version = /s/^version = .*/version = \"${VERSION}\"/" src-tauri/Cargo.toml
          cd src-tauri && cargo update -p branchdeck --precise "${VERSION}" 2>/dev/null || cargo generate-lockfile

      - name: Commit and tag
        if: ${{ inputs.dry_run == false }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock
          git diff --cached --quiet && { echo "::error::No version changes detected"; exit 1; }
          git commit -m "chore: release v${{ steps.bump.outputs.version }}"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin HEAD:main "${{ steps.bump.outputs.tag }}"

      - name: Dry run summary
        if: ${{ inputs.dry_run == true }}
        run: echo "## Dry run — would release ${{ steps.bump.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build & release
    needs: version
    if: ${{ inputs.dry_run == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      # IMPORTANT: Before the first release with auto-update enabled, you MUST:
      # 1. Generate a signing keypair: `tauri signer generate -w ~/.tauri/branchdeck.key`
      # 2. Set repository secrets: TAURI_SIGNING_PRIVATE_KEY and TAURI_SIGNING_PRIVATE_KEY_PASSWORD
      # 3. Replace "REPLACE_BEFORE_RELEASE" in src-tauri/tauri.conf.json with the public key
      # 4. Set includeUpdaterJson: true below
      - name: Build Tauri app (deb + AppImage)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: "Branchdeck ${{ needs.version.outputs.tag }}"
          releaseBody: |
            ## Branchdeck ${{ needs.version.outputs.tag }}

            ### Quick Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/unquale/Branchdeck/main/scripts/install.sh | sh
            ```

            ### Manual Install

            **Debian/Ubuntu (.deb)**
            ```bash
            sudo dpkg -i branchdeck_${{ needs.version.outputs.version }}_amd64.deb
            ```

            **Fedora/RHEL (.rpm)**
            ```bash
            sudo rpm -i branchdeck-${{ needs.version.outputs.version }}-1.x86_64.rpm
            ```

            **AppImage**
            ```bash
            chmod +x branchdeck_${{ needs.version.outputs.version }}_amd64.AppImage
            ./branchdeck_${{ needs.version.outputs.version }}_amd64.AppImage
            ```

            **Daemon only**
            ```bash
            BRANCHDECK_NO_DESKTOP=1 curl -fsSL https://raw.githubusercontent.com/unquale/Branchdeck/main/scripts/install.sh | sh
            ```
          releaseDraft: false
          prerelease: true
          includeUpdaterJson: false
          args: --verbose

      - name: Build standalone daemon binary
        run: |
          cargo build --release --package branchdeck-daemon
          cp target/release/branchdeck-daemon branchdeck-daemon-linux-amd64

      - name: Build RPM package
        run: |
          cargo install cargo-generate-rpm 2>/dev/null || true
          if command -v cargo-generate-rpm > /dev/null 2>&1; then
            cargo generate-rpm --package branchdeck-daemon -o branchdeck-daemon-${{ needs.version.outputs.version }}-1.x86_64.rpm 2>/dev/null || echo "::warning::RPM generation for daemon skipped — configure [package.metadata.generate-rpm] in Cargo.toml"
          else
            echo "::warning::cargo-generate-rpm not available, skipping RPM"
          fi

      - name: Upload additional release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.version.outputs.tag }}"

          # Upload standalone daemon binary
          if [ -f branchdeck-daemon-linux-amd64 ]; then
            gh release upload "$TAG" branchdeck-daemon-linux-amd64 --clobber
          fi

          # Upload RPM if generated
          for rpm in *.rpm; do
            [ -f "$rpm" ] && gh release upload "$TAG" "$rpm" --clobber
          done
