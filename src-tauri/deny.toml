    { id = "RUSTSEC-2024-0417", reason = "transitive: Tauri GTK3" },
    { id = "RUSTSEC-2024-0418", reason = "transitive: Tauri GTK3" },
    { id = "RUSTSEC-2024-0419", reason = "transitive: Tauri GTK3" },
    { id = "RUSTSEC-2024-0420", reason = "transitive: Tauri GTK3" },
    { id = "RUSTSEC-2024-0436", reason = "transitive: Tauri GLib" },
