[advisories]
# Ignore all unmaintained advisories. Tauri pulls in dozens of GTK3/GLib
# bindings on Linux, all flagged as unmaintained (RUSTSEC-2024-0411 through
# 0420, etc.). These are transitive dependencies we cannot control.
# Vulnerability advisories still error.
ignore = [
    # GTK3 bindings family (Tauri/Linux) — unmaintained, no security impact
