[package]
name = "branchdeck"
version = "0.1.1"
description = "Terminal-first workflow manager for git repositories and worktrees"
authors = ["Doga"]
edition = "2021"

[lib]
name = "branchdeck_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
tauri-plugin-global-shortcut = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
git2 = "0.20"
portable-pty = "0.9"
tokio = { version = "1", features = ["full"] }
thiserror = "2"
dirs = "6"
sha2 = "0.10"
uuid = { version = "1", features = ["v4"] }

[lints.rust]
unsafe_code = "deny"

[lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
pedantic = { level = "warn", priority = -1 }

